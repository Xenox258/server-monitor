services:
  backend:
    build:
      context: ./backend
    image: rpi-monitor-backend:latest
    container_name: rpi-monitor-backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: rpi-monitor-frontend:latest
    container_name: rpi-monitor-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
